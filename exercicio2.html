<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados</title>
    <script>
        window.onload = inicio;

        function inicio() {
            let botao = document.getElementById('botao');
            botao.addEventListener('click', envia);
        }

        function envia() {
            let saida = document.getElementById('saida');
            let valor = document.getElementById('valor').value;
            
            const xhttp = new XMLHttpRequest();
            xhttp.onload = function () {
                let objetoRecebido = JSON.parse(this.responseText);
                console.log(objetoRecebido);
                saida.innerHTML = objetoRecebido.rendimento;
            }
            xhttp.open("POST", "trade.php");
            xhttp.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
            xhttp.send(`valor=${valor}`);
        }
    </script>
</head>

<body>
    <label for="">Digite o valor em Reais:</label>
    <input type="number" id="valor"><br>

    <button id="botao">Jogar no tigre</button>
    <p id="saida"></p>
</body>

</html>
